<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>repro</title>
<style>
:root{ --bg:#0B0D12; --surface:#14171E; --line:#2A313D; --text:#F4F6FA; --muted:#B2BAC7; --accent:#5CCFE6; --accent-2:#8FE0F0; --glow:rgba(92,207,230,.4);}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh}
header{position:sticky;top:0;z-index:50;background:rgba(11,13,18,.7);border-bottom:1px solid var(--line);backdrop-filter:blur(14px)}
.nav{display:flex;align-items:center;justify-content:space-between;height:64px;max-width:1180px;margin:0 auto;padding:0 28px}
.back{display:inline-flex;align-items:center;gap:9px;color:var(--text);text-decoration:none;font-weight:600}
.nav-right{display:flex;align-items:center;gap:16px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:26px;max-width:1100px;margin:30px auto;padding:0 24px}
.cs-detail{display:none}
</style>
<script>
// stub fetch BEFORE admin.js loads
const _img = (w,h,c)=> 'data:image/svg+xml;utf8,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'"><rect width="100%" height="100%" fill="'+c+'"/></svg>');
const DATA3D = { "3d": { items: [
  { id:'clx', title:'CLX Cabinet', tag:'Modeling . Texturing . Lighting .Rendering', desc:'CLX Cabinet 3D photorealistic product',
    cover:_img(1600,1000,'#222'),
    meta:{ role:'3D product Designer', timeline:'2026', platform:'', focus:'', software:'Maya . Substance painter . Photoshop . Blender' },
    blocks:[
      {id:'b1',type:'image',src:_img(1600,1000,'#2a2a2a'),caption:''},
      {id:'b2',type:'image',src:_img(1600,1000,'#303030'),caption:''},
      {id:'b3',type:'image',src:_img(1600,1000,'#262626'),caption:''}
    ]},
  { id:'other', title:'Cream of Nature shampoo', tag:'Modeling', desc:'x', cover:_img(1600,1000,'#222'), meta:{role:'3D'}, blocks:[] }
] } };
const _origFetch = window.fetch;
window.fetch = function(u, opt){
  if(typeof u==='string' && u.indexOf('portfolio-data.json')===0){
    return Promise.resolve(new Response(JSON.stringify(DATA3D), {status:200, headers:{'Content-Type':'application/json'}}));
  }
  return _origFetch.apply(this, arguments);
};
window.AK_ADMIN={page:'3d',noun:'project',gridSelector:'.pgrid',tileTag:'article'};
</script>
</head>
<body>
<header><div class="nav"><a class="back" href="index.html"><span class="arr">&larr;</span> Back</a><div class="nav-right"></div></div></header>
<main>
  <div class="pgrid"></div>
  <div class="cs-detail"><div class="cs-bar"><div class="cs-bar-inner"><div class="tabbar"></div></div></div></div>
</main>
<script src="admin.js?v=2"></script>
</body>
</html>
